<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 60" width="820" height="60" role="img" aria-label="Принципы работы">
  <style>
    .line {
      font: 600 19px ui-monospace, 'SFMono-Regular', 'Fira Code', Menlo, Consolas, monospace;
      fill: #58A6FF;
      text-anchor: middle;
      dominant-baseline: middle;
    }
    .cursor {
      font: 600 22px ui-monospace, 'SFMono-Regular', 'Fira Code', Menlo, Consolas, monospace;
      fill: #58A6FF;
    }
  </style>

  <g transform="translate(410, 30)">
    <text class="line" opacity="0">
      Правильный инструмент важнее модного
      <animate attributeName="opacity"
        values="0;1;1;0;0"
        keyTimes="0;0.012;0.188;0.2;1"
        dur="30s"
        repeatCount="indefinite"/>
    </text>

    <text class="line" opacity="0">
      Понимаю и legacy, и современный стек
      <animate attributeName="opacity"
        values="0;0;1;1;0;0"
        keyTimes="0;0.2;0.212;0.388;0.4;1"
        dur="30s"
        repeatCount="indefinite"/>
    </text>

    <text class="line" opacity="0">
      Поднимал PHP с 5.6 до актуальных версий
      <animate attributeName="opacity"
        values="0;0;1;1;0;0"
        keyTimes="0;0.4;0.412;0.588;0.6;1"
        dur="30s"
        repeatCount="indefinite"/>
    </text>

    <text class="line" opacity="0">
      Переводил Zend Framework на Laminas
      <animate attributeName="opacity"
        values="0;0;1;1;0;0"
        keyTimes="0;0.6;0.612;0.788;0.8;1"
        dur="30s"
        repeatCount="indefinite"/>
    </text>

    <text class="line" opacity="0">
      Эксперименты — в пет-проектах, прод — стабильный стек
      <animate attributeName="opacity"
        values="0;0;1;1;0"
        keyTimes="0;0.8;0.812;0.988;1"
        dur="30s"
        repeatCount="indefinite"/>
    </text>
  </g>

  <text class="cursor" x="790" y="38">
    <animate attributeName="opacity"
      values="1;1;0;0;1"
      keyTimes="0;0.5;0.5;1;1"
      dur="1s"
      repeatCount="indefinite"/>
    ▌
  </text>
</svg>
